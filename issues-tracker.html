<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles/style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind & DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-gray-200 min-h-screen">

    <!-- issues tracker header -->
    <section class="bg-white mb-[60px]">
        <div class="w-11/12 mx-auto flex justify-between items-center py-5">
            <div class="flex gap-2">
                <img class="max-w-[37px]" src="./assets/github-logo.png" alt="">
                <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
            </div>
            <div class="flex gap-2">
                <div>
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search" />
                    </label>
                </div>
                <div>
                    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
                </div>
            </div>
        </div>
    </section>

    <!-- toggle buttons -->
    <section class="container mx-auto mb-4">
        <div class="bg-white p-6 rounded-xl">
            <div id="cart-container">
                <button onclick="switchTab('tab-all')" id="tab-all"
                    class="tab-all bg-white text-[#64748B] border-2 border-[#E4E4E7] rounded-md py-2 px-10 font-semibold">All</button>
                <button onclick="switchTab('tab-open')" id="tab-open"
                    class="tab-open bg-white text-[#64748B] border-2 border-[#E4E4E7] rounded-md py-2 px-10 font-semibold">Open</button>
                <button onclick="switchTab('tab-closed')" id="tab-closed"
                    class="tab-closed bg-white text-[#64748B] border-2 border-[#E4E4E7] rounded-md py-2 px-10 font-semibold">Closed</button>
            </div>
        </div>
    </section>

    <!-- issues store section -->
    <section class="container mx-auto mb-4">
        <div class="flex justify-between items-center bg-white p-5 rounded-xl">
            <div class="flex items-center gap-2">
                <img src="./assets/Aperture.png" alt="">
                <div>
                    <h2 class="text-xl font-semibold text-[#1F2937]"><span id="total-carts">0</span> Issues</h2>
                    <p class="text-base text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-2">
                <p class="text-base font-medium text-[#1F2937]"><i class="fa-solid fa-circle"
                        style="color: rgb(99, 230, 190);"></i> Open</p>
                <p class="text-base font-medium text-[#1F2937]"><i class="fa-solid fa-circle"
                        style="color: rgb(72, 20, 224);"></i> Closed</p>
            </div>
        </div>
        <hr class="text-[#E4E4E7] ">
    </section>

    <!-- cart section -->
    <section class="container mx-auto bg-gray-200">
        <div id="all-cart-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
        </div>
    </section>


    <script src="script/script.js"></script>
</body>

</html>
